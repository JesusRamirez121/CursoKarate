plugins {
    id 'java'
}

group = 'com.co.jesusr'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'io.karatelabs:karate-junit5:1.5.0'
}

test {
    useJUnitPlatform()
}